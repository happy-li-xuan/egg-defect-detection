 <!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext x=%2250%%22 y=%2250%%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2260%22%3E%F0%9F%A5%9A%3C/text%3E%3C/svg%3E"><title>鸡蛋缺陷检测系统</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117; color: #e4e6ed; min-height: 100vh;
    display: flex; flex-direction: column;
  }
  header {
    background: linear-gradient(135deg, #1a1d2e 0%, #252840 100%);
    border-bottom: 1px solid #2a2d3e; padding: 20px 24px; text-align: center;
  }
  header h1 { font-size: 22px; font-weight: 600; color: #f0b27a; }
  header p { font-size: 13px; color: #8b8fa3; margin-top: 4px; }
  main { flex: 1; max-width: 960px; width: 100%; margin: 0 auto; padding: 24px 16px; }
  .card {
    background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 12px;
    padding: 24px; margin-bottom: 20px;
  }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #c8cbd8; }

  /* 上传区域 */
  .upload-zone {
    border: 2px dashed #3a3d52; border-radius: 12px; padding: 40px 20px;
    text-align: center; cursor: pointer; transition: all 0.2s;
    background: #141724;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: #f0b27a; background: #1a1e32;
  }
  .upload-zone.has-image { padding: 0; border-style: solid; border-color: #2a2d3e; background: transparent; cursor: default; }
  .upload-zone .icon { font-size: 40px; color: #5a5d72; margin-bottom: 12px; }
  .upload-zone .text { font-size: 14px; color: #8b8fa3; }
  .upload-zone .text strong { color: #c8cbd8; }
  .upload-zone .hint { font-size: 12px; color: #5a5d72; margin-top: 8px; }
  .upload-zone input[type="file"] { display: none; }
  .upload-zone img.preview { max-width: 100%; max-height: 500px; border-radius: 8px; display: block; margin: 0 auto; }

  /* 控制栏 */
  .controls { display: flex; gap: 12px; align-items: center; margin-top: 16px; flex-wrap: wrap; }
  .controls label { font-size: 13px; color: #8b8fa3; }
  .controls input[type="number"] {
    width: 70px; padding: 6px 10px; border-radius: 6px; border: 1px solid #3a3d52;
    background: #141724; color: #e4e6ed; font-size: 13px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 20px; border-radius: 8px; border: none; font-size: 14px;
    font-weight: 500; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: #f0b27a; color: #0f1117; }
  .btn-primary:hover { background: #e8a05e; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: #2a2d3e; color: #c8cbd8; }
  .btn-secondary:hover { background: #3a3d52; }

  /* 结果区域 */
  .result-image { text-align: center; margin: 16px 0; }
  .result-image img { max-width: 100%; max-height: 500px; border-radius: 8px; }
  .result-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .result-table th { text-align: left; padding: 8px 12px; color: #8b8fa3; font-weight: 500; border-bottom: 1px solid #2a2d3e; }
  .result-table td { padding: 8px 12px; border-bottom: 1px solid #252840; }
  .level-badge {
    display: inline-block; padding: 2px 10px; border-radius: 100px; font-size: 12px; font-weight: 500;
  }
  .level-good { background: #1a3a2a; color: #4ade80; }
  .level-normal { background: #3a2a1a; color: #fbbf24; }
  .level-danger { background: #3a1a1a; color: #f87171; }
  .summary { font-size: 15px; margin-bottom: 12px; }
  .summary .label { color: #8b8fa3; }
  .summary .value { font-weight: 600; }

  /* 状态提示 */
  .status {
    display: none; padding: 10px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px;
  }
  .status.error { display: block; background: #3a1a1a; color: #f87171; border: 1px solid #5a2a2a; }
  .status.loading { display: block; background: #1a2a3a; color: #60a5fa; border: 1px solid #2a3a5a; }

  /* 健康检查状态 */
  .health-bar {
    display: flex; gap: 16px; align-items: center; font-size: 12px; color: #5a5d72;
    padding: 8px 0;
  }
  .health-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  .health-dot.ok { background: #4ade80; box-shadow: 0 0 6px #4ade8066; }
  .health-dot.fail { background: #f87171; }
  .health-dot.loading { background: #fbbf24; animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  footer {
    text-align: center; padding: 16px; font-size: 12px; color: #5a5d72;
    border-top: 1px solid #1a1d2e;
  }
  footer a { color: #8b8fa3; text-decoration: none; }
  footer a:hover { color: #f0b27a; }

  @media (max-width: 600px) {
    header h1 { font-size: 18px; }
    .card { padding: 16px; }
  }
</style>
</head>
<body>
<header>
  <h1>🥚 鸡蛋缺陷检测系统</h1>
  <p>基于 YOLOv8 的鸡蛋表面缺陷智能识别</p>
  <div class="health-bar" id="healthBar">
    <span class="health-dot loading" id="healthDot"></span>
    <span id="healthText">正在连接检测服务...</span>
  </div>
</header>

<main>
  <div class="status" id="statusMsg"></div>

  <div class="card">
    <div class="card-title">📸 上传鸡蛋图片</div>
    <div class="upload-zone" id="uploadZone">
      <div class="icon">📷</div>
      <div class="text">点击或拖拽图片到此处</div>
      <div class="hint">支持 JPG / PNG / WEBP</div>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <div class="controls">
      <label>置信度阈值:</label>
      <input type="number" id="confSlider" min="0.1" max="0.99" step="0.05" value="0.65">
      <button class="btn btn-primary" id="detectBtn" disabled>🔍 开始检测</button>
      <button class="btn btn-secondary" id="resetBtn">↺ 重新选择</button>
    </div>
  </div>

  <div class="card" id="resultCard" style="display:none;">
    <div class="card-title">📊 检测结果</div>
    <div class="summary" id="resultSummary"></div>
    <div class="result-image" id="resultImage"></div>
    <table class="result-table" id="resultTable">
      <thead><tr><th>目标</th><th>类别</th><th>置信度</th><th>位置 (x1,y1,x2,y2)</th></tr></thead>
      <tbody id="resultBody"></tbody>
    </table>
  </div>
</main>

<footer>
  <p>鸡蛋缺陷检测系统 · <a href="#" onclick="event.preventDefault();checkHealth()">服务状态</a> · <a href="/api/health" target="_blank">API Health</a></p>
</footer>

<script>
const $ = id => document.getElementById(id);
const uploadZone = $('uploadZone');
const fileInput = $('fileInput');
const detectBtn = $('detectBtn');
const resetBtn = $('resetBtn');
const statusMsg = $('statusMsg');
const resultCard = $('resultCard');
const resultSummary = $('resultSummary');
const resultImage = $('resultImage');
const resultBody = $('resultBody');
const confSlider = $('confSlider');
const healthDot = $('healthDot');
const healthText = $('healthText');

let currentFile = null;

// === 健康检查 ===
async function checkHealth() {
  healthDot.className = 'health-dot loading';
  healthText.textContent = '正在连接...';
  try {
    const res = await fetch('/api/health');
    const data = await res.json();
    if (data.status === 'ok') {
      healthDot.className = 'health-dot ok';
      healthText.textContent = '服务正常 · 模型: ' + (data.model || 'best.pt');
    } else {
      healthDot.className = 'health-dot fail';
      healthText.textContent = '模型未加载 (' + (data.model_path || '未知路径') + ')';
    }
  } catch (e) {
    healthDot.className = 'health-dot fail';
    healthText.textContent = '无法连接检测服务';
  }
}
checkHealth();
setInterval(checkHealth, 30000);

// === 上传区域交互 ===
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

function handleFile(file) {
  if (!file.type.startsWith('image/')) {
    showStatus('请选择图片文件', 'error');
    return;
  }
  currentFile = file;
  const reader = new FileReader();
  reader.onload = (e) => {
    uploadZone.innerHTML = `<img class="preview" src="${e.target.result}" alt="preview">`;
    uploadZone.classList.add('has-image');
    detectBtn.disabled = false;
    hideStatus();
  };
  reader.readAsDataURL(file);
}

resetBtn.addEventListener('click', resetUpload);
function resetUpload() {
  currentFile = null;
  fileInput.value = '';
  uploadZone.innerHTML = `
    <div class="icon">📷</div>
    <div class="text">点击或拖拽图片到此处</div>
    <div class="hint">支持 JPG / PNG / WEBP</div>
  `;
  uploadZone.classList.remove('has-image');
  detectBtn.disabled = true;
  resultCard.style.display = 'none';
  hideStatus();
}

// === 检测 ===
detectBtn.addEventListener('click', detectImage);
async function detectImage() {
  if (!currentFile) return;
  detectBtn.disabled = true;
  detectBtn.textContent = '⏳ 检测中...';
  resultCard.style.display = 'none';
  showStatus('正在检测，请稍候...', 'loading');

  const formData = new FormData();
  formData.append('file', currentFile);
  formData.append('conf', confSlider.value);

  try {
    const res = await fetch('/api/detect', { method: 'POST', body: formData });
    const data = await res.json();
    hideStatus();

    if (!data.success) {
      showStatus(data.error || '检测失败', 'error');
      return;
    }

    // 显示结果
    resultCard.style.display = 'block';
    const levelClass = 'level-' + (data.level || 'normal');
    resultSummary.innerHTML = `
      <span class="label">检测结论:</span>
      <span class="value">${data.result || '未知'}</span>
      &nbsp;&nbsp;
      <span class="level-badge ${levelClass}">${data.result || '-'}</span>
      <br>
      <span class="label" style="font-size:13px;color:#8b8fa3;">${data.summary || ''}</span>
    `;

    if (data.image) {
      resultImage.innerHTML = `<img src="${data.image}" alt="检测结果">`;
    } else {
      resultImage.innerHTML = '';
    }

    if (data.detections && data.detections.length) {
      resultBody.innerHTML = data.detections.map((d, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${d.class || d.class_id}</td>
          <td>${(d.confidence * 100).toFixed(1)}%</td>
          <td style="font-size:12px;color:#8b8fa3;">(${d.bbox.x1.toFixed(0)}, ${d.bbox.y1.toFixed(0)}) (${d.bbox.x2.toFixed(0)}, ${d.bbox.y2.toFixed(0)})</td>
        </tr>
      `).join('');
    } else {
      resultBody.innerHTML = '<tr><td colspan="4" style="color:#8b8fa3;text-align:center;">未检测到明显缺陷</td></tr>';
    }
  } catch (e) {
    showStatus('请求失败: ' + e.message, 'error');
  } finally {
    detectBtn.disabled = false;
    detectBtn.textContent = '🔍 开始检测';
  }
}

function showStatus(msg, type) {
  statusMsg.className = 'status ' + type;
  statusMsg.textContent = msg;
  statusMsg.style.display = 'block';
}
function hideStatus() {
  statusMsg.style.display = 'none';
  statusMsg.className = 'status';
}
</script>
</body>
</html>
